name: Acceptance Criteria Check

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  ac-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    concurrency:
      group: ac-check-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Unit tests intentionally disabled for now
      # - name: Restore & test
      #   run: |
      #     dotnet restore
      #     dotnet test --logger "trx;LogFileName=test_results.trx" --results-directory ./TestResults
      #     echo "TEST_SUMMARY=$(grep -o 'Total tests:.*' TestResults/test_results.trx | tail -n1 || true)" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub openai tiktoken

      - name: Run AC checker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JIRA_AC_FIELD_ID: ${{ secrets.JIRA_AC_FIELD_ID }}
          # TEST_SUMMARY: ${{ env.TEST_SUMMARY }}
        run: python .github/scripts/check_acceptance.py
