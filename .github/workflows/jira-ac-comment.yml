name: Jira AC → PR comment (Azure+fallback)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  ac_summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # This step is your existing script that sets outputs.markdown
      - name: Fetch & summarize AC (no PR comment here)
        id: ac
        env:
          JIRA_BASE_URL:        ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL:           ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:       ${{ secrets.JIRA_API_TOKEN }}
          AZURE_OPENAI_ENDPOINT:   ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY:    ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT:  ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
        run: |
          # (your working bash script here) 
          # It must finish by setting the Markdown into the output:
          #   echo "::set-output name=markdown::$MARKDOWN"
          # In modern syntax:
          #   echo "markdown<<EOF" >> "$GITHUB_OUTPUT"
          #   echo "$MARKDOWN" >> "$GITHUB_OUTPUT"
          #   echo "EOF" >> "$GITHUB_OUTPUT"
          # For brevity, reuse what you already have that produced jira-ac.md and the summary.

      # Comment the markdown on the PR (upsert by marker)
      - name: Comment AC in PR
        if: steps.ac.outputs.markdown != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- ac-bot-jira -->";
            const body = `${marker}\n${process.env.AC_MD}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
        env:
          AC_MD: ${{ steps.ac.outputs.markdown }}
