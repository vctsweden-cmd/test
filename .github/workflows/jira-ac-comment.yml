name: Jira AC → PR comment + AI check (Azure)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled]

permissions:
  contents: read
  pull-requests: write

jobs:
  ac_and_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) Get AC from Jira (Azure if available, else parser) and comment it
      - name: Fetch AC + comment
        id: ac
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        with:
          script: |
            const marker = "<!-- ac-bot-jira -->";

            // ---- Gather PR context
            const pr = context.payload.pull_request;
            const title = pr.title || "", body = pr.body || "";
            const head = pr.head?.ref || "", base = pr.base?.ref || "";

            // include label like jira:ABC-123
            let labelKey = null;
            if (Array.isArray(pr.labels)) {
              const hit = pr.labels.find(l => l?.name && /^jira:/i.test(l.name));
              if (hit) labelKey = hit.name.split(":")[1]?.trim();
            }

            // include commit messages
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, per_page: 250
            });
            const commitText = commits.data.map(c => c.commit?.message || "").join("\n");

            // find Jira key (normalize to UPPER)
            const haystack = [title, body, head, base, labelKey, commitText].filter(Boolean).join("\n");
            const re = /\b([A-Z][A-Z0-9]+-\d+)\b/gi;
            const keys = new Set(); let m; while ((m = re.exec(haystack)) !== null) keys.add(m[1].toUpperCase());
            const key = [...keys][0] || "";

            if (!key) {
              const bodyMd = `${marker}\n_No Jira key found in PR title/body/branches/commits/labels._`;
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: bodyMd });
              core.setOutput("ac_bullets_json", "[]");
              return;
            }

            // ---- Fetch Jira issue
            const baseUrl = process.env.JIRA_BASE_URL, email = process.env.JIRA_EMAIL, token = process.env.JIRA_API_TOKEN;
            if (!baseUrl || !email || !token) throw new Error("Missing JIRA_BASE_URL / JIRA_EMAIL / JIRA_API_TOKEN");
            const auth = "Basic " + Buffer.from(`${email}:${token}`).toString("base64");
            const resp = await fetch(`${baseUrl.replace(/\/+$/,"")}/rest/api/3/issue/${encodeURIComponent(key)}`, {
              headers: { "Accept": "application/json", "Authorization": auth }
            });
            if (!resp.ok) throw new Error(`Jira fetch failed: ${resp.status} ${await resp.text()}`);
            const issue = await resp.json();

            // ---- Try Azure to extract AC
            async function acViaAzure(issueJson){
              const ep = process.env.AZURE_OPENAI_ENDPOINT, k = process.env.AZURE_OPENAI_API_KEY, dep = process.env.AZURE_OPENAI_DEPLOYMENT;
              const ver = process.env.AZURE_OPENAI_API_VERSION || "2024-02-15-preview";
              if (!ep || !k || !dep) return null;
              const url = `${ep.replace(/\/+$/,"")}/openai/deployments/${encodeURIComponent(dep)}/chat/completions?api-version=${encodeURIComponent(ver)}`;
              const r = await fetch(url, {
                method: "POST",
                headers: { "api-key": k, "Content-Type": "application/json" },
                body: JSON.stringify({
                  temperature: 0,
                  messages: [
                    { role: "system", content: "Extract Acceptance Criteria from this Jira issue JSON. Prefer a dedicated AC field if present; else parse Description (Atlassian rich-text). Return ONLY Markdown bullets, one per criterion. If none, return '- (none found)'." },
                    { role: "user", content: "Issue JSON:\n" + JSON.stringify(issueJson) }
                  ]
                })
              });
              if (!r.ok) { core.warning(`Azure OpenAI ${r.status}`); return null; }
              const d = await r.json();
              return d?.choices?.[0]?.message?.content?.trim() || null;
            }

            // ---- Fallback parser (ADF flatten)
            function flattenADF(doc){
              if (!doc || typeof doc !== "object") return "";
              function w(n){
                if (!n) return "";
                if (n.type === "text") return n.text || "";
                const parts = (n.content || []).map(w).join("");
                if (n.type === "listItem") return "- " + parts + "\n";
                if (n.type === "paragraph" || n.type === "heading") return parts + "\n";
                return parts;
              }
              return w(doc).replace(/\n{3,}/g, "\n\n").trim();
            }
            function parseAcFromText(text){
              const lines = (text || "").split(/\r?\n/).map(s => s.trim());
              let ac = []; let cap = false;
              for (const l of lines) {
                if (/^acceptance\s+criteria\b/i.test(l)) { cap = true; continue; }
                if (cap && l === "") break;
                if (cap && l) ac.push(l.replace(/^[\-\*\[\]\(\)\s]+/, ""));
              }
              if (!ac.length) ac = lines.filter(l => /^[-*\[]/.test(l)).map(l => l.replace(/^[\-\*\[\]\(\)\s]+/, ""));
              const seen = new Set(); const out = [];
              for (const x of ac.map(x => x.replace(/\s+/g," ").trim()).filter(Boolean)) if (!seen.has(x)) { seen.add(x); out.push(x); }
              return out;
            }

            let acMd = await acViaAzure(issue);
            if (!acMd) {
              const desc = issue.fields?.description;
              let text = "";
              if (desc && typeof desc === "object" && Array.isArray(desc.content)) text = flattenADF(desc);
              else if (typeof desc === "string") text = desc;
              const list = parseAcFromText(text);
              acMd = list.length ? list.map(x => "- " + x).join("\n") : "- (none found)";
            }

            const bodyMd = `${marker}
### Jira Acceptance Criteria
**${key}**

${acMd}
`;
            // upsert PR comment
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: bodyMd });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: bodyMd });
            }

            // expose AC bullets for the next step
            const bullets = acMd.split("\n")
              .map(l => l.replace(/^\s*[-*•]\s*/, "").trim())
              .filter(Boolean);
            core.setOutput("ac_bullets_json", JSON.stringify(bullets));

      # 2) Build diff, evaluate AC vs code with Azure, and comment results
      - name: Evaluate AC vs PR diff (Azure) + comment
        if: steps.ac.outputs.ac_bullets_json != '[]'
        uses: actions/github-script@v7
        env:
          AC_ARRAY_JSON: ${{ steps.ac.outputs.ac_bullets_json }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        with:
          script: |
            const marker = "<!-- ac-azure-compare -->";

            // Build compact unified diff (shell from Node)
            const { execSync } = require("child_process");
            try { execSync(`git fetch origin ${process.env.GITHUB_BASE_REF} --depth=1`, { stdio: "ignore" }); } catch {}
            try { execSync(`git fetch origin ${process.env.GITHUB_HEAD_REF} --depth=1`, { stdio: "ignore" }); } catch {}
            let diff = "";
            try {
              diff = execSync(`git diff --unified=0 --no-color origin/${process.env.GITHUB_BASE_REF}...origin/${process.env.GITHUB_HEAD_REF}`, { encoding: "utf8", maxBuffer: 1024*1024*10 });
              if (diff.length > 180000) diff = diff.slice(0, 180000);
            } catch (e) { diff = "(no diff)"; }

            const ac = JSON.parse(process.env.AC_ARRAY_JSON || "[]");

            async function post(body){
              const pr = context.payload.pull_request;
              const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number });
              const existing = comments.find(c => c.body?.includes(marker));
              if (existing) {
                await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
              } else {
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body });
              }
            }

            async function callAzure(){
              const ep  = process.env.AZURE_OPENAI_ENDPOINT;
              const key = process.env.AZURE_OPENAI_API_KEY;
              const ver = process.env.AZURE_OPENAI_API_VERSION || "2024-02-15-preview";
              const dep = process.env.AZURE_OPENAI_DEPLOYMENT;
              if (!ep || !key || !dep) return null;
              const url = `${ep.replace(/\/+$/,"")}/openai/deployments/${encodeURIComponent(dep)}/chat/completions?api-version=${encodeURIComponent(ver)}`;
              const resp = await fetch(url, {
                method: "POST",
                headers: { "api-key": key, "Content-Type": "application/json" },
                body: JSON.stringify({
                  temperature: 0,
                  response_format: { type: "json_object" },
                  messages: [
                    { role: "system", content:
                      "You are a senior C# reviewer. For EACH acceptance criterion, read the unified diff and decide: satisfied | not_satisfied | unknown. Be conservative. Return STRICT JSON: {summary, results:[{criterion, status, confidence, evidence, suggested_tests}]}. Evidence should quote file:line snippets from the diff." },
                    { role: "user", content:
                      "Acceptance Criteria:\n" + JSON.stringify(ac, null, 2) + "\n\nUnified diff:\n" + diff }
                  ]
                })
              });
              if (!resp.ok) return null;
              const data = await resp.json();
              try { return JSON.parse(data.choices[0].message.content); } catch { return null; }
            }

            const out = await callAzure();
            if (!out || !Array.isArray(out.results)) {
              await post(`${marker}\n### AC vs Code – AI Check\n_Azure evaluation unavailable._ Diff size: ${diff.length} chars`);
              return;
            }

            const emoji = s => ({ satisfied:"✅", not_satisfied:"❌", unknown:"⚠️" }[s] || "⚠️");
            let md = `${marker}
### Acceptance Criteria – AI Check
Diff analyzed: ${diff.length} chars

| Criterion | Status | Confidence |
|---|---|---|
`;
            let anyFail = false;
            for (const r of out.results) {
              if (r.status === "not_satisfied") anyFail = true;
              md += `| ${String(r.criterion).replace(/\|/g,"\\|")} | ${emoji(r.status)} ${r.status} | ${(Number(r.confidence)||0).toFixed(2)} |\n`;
            }
            if (out.summary) md += `\n**Summary:** ${out.summary}\n`;
            md += `\n**Notes & Evidence**\n`;
            for (const r of out.results) {
              const ev = Array.isArray(r.evidence) ? r.evidence.slice(0,5).join("; ") : "—";
              const tests = Array.isArray(r.suggested_tests) ? r.suggested_tests.slice(0,3).join("; ") : "—";
              md += `- \`${r.criterion}\` → ${emoji(r.status)} **${r.status}** · Evidence: ${ev} · Suggested tests: ${tests}\n`;
            }
            await post(md);

            // Optional: fail job if any AC not satisfied (uncomment next line to enforce)
            // core.setFailed(anyFail ? "One or more acceptance criteria were NOT satisfied." : "");
