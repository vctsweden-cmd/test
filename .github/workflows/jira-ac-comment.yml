name: Jira AC → PR comment (simple AI)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  ac-comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AC from Jira with AI and comment
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        with:
          script: |
            const marker = "<!-- ac-ai-jira -->";
            const pr = context.payload.pull_request || {};
            const title = pr.title || "";
            const body  = pr.body  || "";
            const branch = pr.head?.ref || "";

            // Find first Jira key like ABC-123
            const keys = [...new Set((title + "\n" + body + "\n" + branch).match(/\b([A-Z][A-Z0-9]+-\d+)\b/g) || [])];
            if (!keys.length) {
              const msg = `${marker}\n_No Jira key found in PR title/body/branch._`;
              const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
              const existing = comments.find(c => c.body?.includes(marker));
              if (existing) await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: msg });
              else await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: msg });
              return;
            }
            const key = keys[0];

            // Get Jira issue JSON
            const auth = "Basic " + Buffer.from(`${process.env.JIRA_EMAIL}:${process.env.JIRA_API_TOKEN}`).toString("base64");
            const url  = `${process.env.JIRA_BASE_URL}/rest/api/3/issue/${encodeURIComponent(key)}?expand=renderedFields`;
            const r = await fetch(url, { headers: { "Accept":"application/json", "Authorization": auth } });
            if (!r.ok) throw new Error(`Jira fetch failed: ${r.status} ${await r.text()}`);
            const issue = await r.json();

            // Ask OpenAI to extract AC (works for custom fields or description)
            const messages = [
              { role: "system", content:
                "Extract Acceptance Criteria from this Jira issue JSON. Prefer any obvious custom field; otherwise parse the Description (Atlassian rich-text). Return ONLY Markdown bullets, one per criterion. If none, return '- (none found)'." },
              { role: "user", content: `Jira key: ${key}\nIssue JSON:\n${JSON.stringify(issue)}` }
            ];
            const ai = await fetch("https://api.openai.com/v1/chat/completions", {
              method: "POST",
              headers: { "Authorization": `Bearer ${process.env.OPENAI_API_KEY}`, "Content-Type":"application/json" },
              body: JSON.stringify({ model: "gpt-4.1-mini", temperature: 0, messages })
            });
            if (!ai.ok) throw new Error(`OpenAI ${ai.status}: ${await ai.text()}`);
            const data = await ai.json();
            const acListMd = (data.choices?.[0]?.message?.content || "- (none found)").trim();

            // Upsert PR comment
            const bodyMd = `${marker}
### Jira Acceptance Criteria
**${key}**

${acListMd}
`;
            const { data: comments } = await github.rest.issues.listComments({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number });
            const existing = comments.find(c => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body: bodyMd });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: bodyMd });
            }
