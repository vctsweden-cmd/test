name: Jira AC → Job Summary (Azure + fallback, no PR comment)

on:
  pull_request:
    types: [opened, synchronize, reopened, edited, labeled]

permissions:
  contents: read       # no "pull-requests: write" needed anymore

jobs:
  ac_summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch AC from Jira (Azure OpenAI + fallback)
        id: ac
        uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        with:
          script: |
            const pr = context.payload.pull_request || {};
            const title = pr.title || "";
            const body  = pr.body  || "";
            const head  = pr.head?.ref || "";
            const base  = pr.base?.ref || "";

            // Optional label like jira:ABC-123
            let labelKey = null;
            if (Array.isArray(pr.labels)) {
              const hit = pr.labels.find(l => /^jira:/i.test(l.name || ""));
              if (hit) labelKey = (hit.name.split(":")[1] || "").trim();
            }

            // Also search commit messages
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 250
            });
            const commitText = commits.data.map(c => c.commit?.message || "").join("\n");

            // Find Jira key(s)
            const haystack = [title, body, head, base, labelKey, commitText].filter(Boolean).join("\n");
            const re = /\b([A-Z][A-Z0-9]+-\d+)\b/gi;
            const keys = new Set(); let m;
            while ((m = re.exec(haystack)) !== null) keys.add(m[1].toUpperCase());
            if (!keys.size) {
              core.setOutput("key", "");
              core.setOutput("markdown", "_No Jira key found in PR title/body/branch/commits/labels._");
              return;
            }
            const key = [...keys][0];

            // Jira fetch
            const baseUrl = process.env.JIRA_BASE_URL;
            const email   = process.env.JIRA_EMAIL;
            const token   = process.env.JIRA_API_TOKEN;
            if (!baseUrl || !email || !token) {
              core.setFailed("Missing one of: JIRA_BASE_URL, JIRA_EMAIL, JIRA_API_TOKEN");
              return;
            }
            const auth = "Basic " + Buffer.from(email + ":" + token).toString("base64");
            const url  = baseUrl.replace(/\/+$/,"") + "/rest/api/3/issue/" + encodeURIComponent(key);
            const r = await fetch(url, { headers: { "Accept":"application/json", "Authorization": auth } });
            if (!r.ok) throw new Error("Jira fetch failed: " + r.status + " " + (await r.text()));
            const issue = await r.json();

            // Azure OpenAI helper (optional)
            async function acViaAzure(issueJson) {
              const endpoint = process.env.AZURE_OPENAI_ENDPOINT;
              const apiKey   = process.env.AZURE_OPENAI_API_KEY;
              const apiVer   = process.env.AZURE_OPENAI_API_VERSION || "2024-02-15-preview";
              const dep      = process.env.AZURE_OPENAI_DEPLOYMENT;
              if (!endpoint || !apiKey || !dep) return null;
              const azureUrl = endpoint.replace(/\/+$/,"") + "/openai/deployments/" + encodeURIComponent(dep) + "/chat/completions?api-version=" + encodeURIComponent(apiVer);
              const messages = [
                { role: "system", content: "Extract Acceptance Criteria from this Jira issue JSON. Prefer a dedicated AC custom field if present; otherwise parse the Description (Atlassian rich-text). Return ONLY Markdown bullets, one per criterion. If none, return '- (none found)'." },
                { role: "user", content: "Issue JSON:\n" + JSON.stringify(issueJson) }
              ];
              const resp = await fetch(azureUrl, {
                method: "POST",
                headers: { "api-key": apiKey, "Content-Type": "application/json" },
                body: JSON.stringify({ temperature: 0, messages })
              });
              if (!resp.ok) { core.warning("Azure OpenAI error " + resp.status + ": " + (await resp.text())); return null; }
              const data = await resp.json();
              return (data?.choices?.[0]?.message?.content || "").trim();
            }

            // Fallback parser (no AI)
            function flattenADF(doc){
              if (!doc || typeof doc !== "object") return "";
              function walk(n){
                if (!n) return "";
                if (n.type === "text") return n.text || "";
                const parts = (n.content || []).map(walk).join("");
                if (n.type === "listItem") return "- " + parts + "\n";
                if (n.type === "paragraph" || n.type === "heading") return parts + "\n";
                return parts;
              }
              return walk(doc).replace(/\n{3,}/g, "\n\n").trim();
            }
            function parseAcFromText(text){
              const lines = (text || "").split(/\r?\n/).map(s => s.trim());
              let ac = [];
              let cap = false;
              for (const l of lines) {
                if (/^acceptance\s+criteria\b/i.test(l)) { cap = true; continue; }
                if (cap && l === "") break;
                if (cap && l) ac.push(l.replace(/^[\-\*\[\]\(\)\s]+/, ""));
              }
              if (!ac.length) ac = lines.filter(l => /^[-*\[]/.test(l)).map(l => l.replace(/^[\-\*\[\]\(\)\s]+/, ""));
              const seen = new Set(); const out = [];
              for (const x of ac.map(x => x.replace(/\s+/g," ").trim()).filter(Boolean)) {
                if (!seen.has(x)) { seen.add(x); out.push(x); }
              }
              return out;
            }

            let acMd = await acViaAzure(issue);
            if (!acMd) {
              const fields = issue.fields || {};
              let text = "";
              if (fields.description && typeof fields.description === "object" && Array.isArray(fields.description.content)) {
                text = flattenADF(fields.description);
              } else if (typeof fields.description === "string") {
                text = fields.description;
              }
              const ac = parseAcFromText(text);
              acMd = ac.length ? ac.map(x => "- " + x).join("\n") : "- (none found)";
            }

            // Prepare markdown for summary/artifact
            const md = `### Jira Acceptance Criteria
**${key || "(no key)"}**

${acMd}
`;
            core.setOutput("key", key || "");
            core.setOutput("markdown", md);

      - name: Write to Job Summary
        if: steps.ac.outputs.markdown != ''
        run: |
          echo "${{ steps.ac.outputs.markdown }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Save AC as artifact
        if: steps.ac.outputs.markdown != ''
        run: |
          mkdir -p out
          printf "%s" "${{ steps.ac.outputs.markdown }}" > out/jira-ac.md
      - uses: actions/upload-artifact@v4
        if: steps.ac.outputs.markdown != ''
        with:
          name: jira-ac
          path: out/jira-ac.md
